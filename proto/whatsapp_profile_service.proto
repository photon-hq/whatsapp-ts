syntax = "proto3";

package photon.whatsapp.v1;

option swift_prefix = "PWApp_";


service ProfileService {

  rpc ModifyProfile(ModifyProfileRequest) returns (ModifyProfileResponse);

}


message ModifyProfileRequest {

  // New push name. Must be non-empty after trimming when present.
  optional string name = 1;

  // New about text. Empty string clears the text status when WhatsApp allows it.
  optional string about = 2;

  // New avatar image bytes (JPEG or PNG). Staged to disk before the helper call.
  optional bytes avatar = 3;

}


message ModifyProfileResponse {

  bool name_updated = 1;

  bool about_updated = 2;

  bool avatar_updated = 3;

}
